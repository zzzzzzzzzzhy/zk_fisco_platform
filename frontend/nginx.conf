server {
    listen 80;
    server_name localhost;

    # 允许大文件上传（切到 IPFS 后常走 /api 直传后端）
    client_max_body_size 600m;
    
    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 前端路由（Vue Router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API（后端使用 host 网络，直接通过宿主机 IP 访问）
    location /api/ {
    # 前端容器通过 host-gateway 访问宿主机上的后端 8082
    proxy_pass http://172.18.0.1:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";

        sub_filter_types application/json;
        sub_filter 'http://127.0.0.1:9000' 'http://13.229.248.211:9000';
        sub_filter_once off;

        # 增加超时时间（适配区块链交易等长时间操作）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 避免大文件上传被缓冲/触发 413
        proxy_request_buffering off;
        proxy_buffering off;

        # API 不做缓存（避免发布/审核/链上状态更新后前端看不到最新数据）
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Coffee 映射服务 API
    location /coffee-api/ {
        proxy_pass http://172.18.0.1:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # 直接代理 MinIO 图片请求（绕过后端）
    location /minio/ {
        proxy_pass http://172.18.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 图片缓存设置
        proxy_cache_valid 200 60m;
        proxy_cache_valid 404 1m;
        proxy_cache_key $request_uri;
        add_header X-Cache-Status $upstream_cache_status;

        # 启用压缩
        gzip_static on;
        gzip_proxied any;
        gzip_types image/jpeg image/png image/gif image/svg+xml;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Accept-Ranges bytes;
        # 启用gzip压缩对图片无效，但可以启用其他优化
        add_header Vary Accept-Encoding;
    }
    # 为 JS/CSS 降低缓存时长，避免用户拿到旧版 bundle
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }
    # index.html 永远禁止缓存，确保获取最新入口
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
