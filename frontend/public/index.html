<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title>竞赛平台 - Competition Platform</title>
    
    <!-- ==========================================
         性能优化：预加载、预连接、DNS 预解析
         ========================================== -->
    
    <!-- 预连接到关键域名（建立 TCP/TLS 连接） -->
    <link rel="preconnect" href="https://rpc.ankr.com" crossorigin>
    <link rel="preconnect" href="https://polygonscan.com" crossorigin>
    <link rel="preconnect" href="https://polygon-rpc.com" crossorigin>
    
    <!-- DNS 预解析（提前解析域名） -->
    <link rel="dns-prefetch" href="//rpc.ankr.com">
    <link rel="dns-prefetch" href="//polygonscan.com">
    <link rel="dns-prefetch" href="//polygon-rpc.com">
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="//unpkg.com">
    
    <!-- 预加载关键资源 -->
    
    <!-- 性能提示 -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but this app doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
